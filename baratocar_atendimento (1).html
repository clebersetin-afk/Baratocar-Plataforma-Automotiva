<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baratocar — Atendimento Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #D72B2B;
  --red-dark: #A81F1F;
  --red-glow: rgba(215,43,43,.3);
  --black: #080808;
  --dark: #101010;
  --dark2: #181818;
  --dark3: #202020;
  --border: #282828;
  --border2: #333;
  --text: #EFEFEF;
  --muted: #686868;
  --green: #25D366;
  --green-bg: rgba(37,211,102,.12);
  --green-border: rgba(37,211,102,.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:15px;height:100%}
body{
  background:var(--black);
  color:var(--text);
  font-family:'Inter',sans-serif;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── HEADER ── */
.header{
  background:var(--dark);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.header-avatar{
  width:42px;height:42px;
  border-radius:50%;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  flex-shrink:0;
  box-shadow:0 0 0 2px var(--dark),0 0 0 4px var(--red);
}
.header-info{flex:1}
.header-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.05rem;
  font-weight:900;
  letter-spacing:.02em;
}
.header-name span{color:var(--red)}
.header-status{
  display:flex;align-items:center;gap:5px;
  font-size:.68rem;color:#4CAF50;
  font-weight:600;margin-top:1px;
}
.header-status::before{
  content:'';width:6px;height:6px;
  border-radius:50%;background:#4CAF50;
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.header-catalog{
  background:var(--dark3);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:6px 10px;
  font-size:.72rem;
  font-weight:700;
  color:var(--text);
  cursor:pointer;
  text-decoration:none;
  white-space:nowrap;
  transition:all .15s;
}
.header-catalog:hover{border-color:var(--red);color:var(--red)}

/* ── MESSAGES AREA ── */
.messages-wrap{
  flex:1;
  overflow-y:auto;
  padding:16px 14px 8px;
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}
.messages-wrap::-webkit-scrollbar{width:3px}
.messages-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── BUBBLE ── */
.msg{display:flex;gap:8px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{
  width:30px;height:30px;
  border-radius:50%;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:800;
  flex-shrink:0;align-self:flex-end;
}
.msg.user .msg-av{background:var(--dark3);border:1px solid var(--border2)}
.bubble{
  max-width:80%;
  padding:10px 13px;
  border-radius:16px;
  font-size:.85rem;
  line-height:1.55;
  word-break:break-word;
}
.msg.bot .bubble{
  background:var(--dark2);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.msg.user .bubble{
  background:var(--red);
  border-bottom-right-radius:4px;
  color:#fff;
}
.msg-meta{font-size:.6rem;color:var(--muted);margin-top:3px}
.msg.user .msg-meta{text-align:right}

/* ── TYPING ── */
.typing{display:flex;gap:8px;align-items:flex-end}
.typing-dots{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:16px;border-bottom-left-radius:4px;
  padding:11px 14px;display:flex;gap:4px;align-items:center;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted);
  animation:tdot 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px);background:var(--red)}}

/* ── QUICK REPLIES ── */
.qr-wrap{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:4px 0 4px 38px;
  animation:fadeUp .25s ease;
}
.qr{
  background:var(--dark3);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:7px 13px;
  font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .15s;
  user-select:none;
}
.qr:hover,.qr:active{background:var(--red);border-color:var(--red);color:#fff}

/* ── CARDS ESPECIAIS ── */
.info-card{
  background:var(--dark2);
  border:1px solid var(--border);
  border-left:3px solid var(--red);
  border-radius:12px;
  padding:13px 15px;
  margin-top:4px;
  font-size:.82rem;
  line-height:1.6;
  animation:fadeUp .25s ease;
  max-width:85%;
}
.info-card-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1rem;font-weight:900;
  color:var(--red);margin-bottom:8px;
  letter-spacing:.02em;
}

/* CTA WhatsApp */
.wa-cta{
  display:flex;align-items:center;gap:11px;
  background:linear-gradient(135deg,#0a1a0a,#0f220f);
  border:1px solid var(--green-border);
  border-radius:13px;padding:13px 15px;
  text-decoration:none;cursor:pointer;
  transition:all .15s;margin-top:6px;
  animation:fadeUp .3s ease;
  max-width:90%;
}
.wa-cta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,211,102,.2)}
.wa-cta .wa-icon{font-size:1.8rem;flex-shrink:0}
.wa-cta .wa-label{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;color:#fff}
.wa-cta .wa-sub{font-size:.68rem;color:#4CAF50;margin-top:2px}

/* CTA Catálogo */
.cat-cta{
  display:flex;align-items:center;gap:11px;
  background:var(--dark2);border:1px solid var(--border2);
  border-radius:13px;padding:11px 15px;
  text-decoration:none;cursor:pointer;
  transition:all .15s;margin-top:8px;
  animation:fadeUp .3s ease;
  max-width:90%;
}
.cat-cta:hover{border-color:var(--red);transform:translateY(-1px)}
.cat-cta .c-label{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;color:#fff}
.cat-cta .c-sub{font-size:.68rem;color:var(--muted);margin-top:2px}

/* Score badge */
.score-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  font-size:.68rem;font-weight:700;margin-top:5px;
}
.s-hot{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.s-warm{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.s-cold{background:rgba(107,114,128,.15);color:#9ca3af;border:1px solid rgba(107,114,128,.2)}

/* Transferência consultor */
.transfer-card{
  background:linear-gradient(135deg,#1a0a0a,#220f0f);
  border:1px solid rgba(215,43,43,.3);
  border-radius:13px;padding:14px 16px;
  margin-top:6px;animation:fadeUp .3s ease;max-width:90%;
}
.transfer-card .t-title{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:900;margin-bottom:4px}
.transfer-card .t-sub{font-size:.75rem;color:var(--muted);margin-bottom:10px}
.transfer-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--red);border:none;border-radius:8px;
  padding:9px 16px;color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:.95rem;font-weight:900;cursor:pointer;
  transition:all .15s;text-decoration:none;
  box-shadow:0 3px 12px var(--red-glow);
}
.transfer-btn:hover{background:var(--red-dark);transform:translateY(-1px)}

/* Avaliação estrelas */
.stars-row{display:flex;gap:5px;margin-top:6px}
.star{font-size:1.3rem;cursor:pointer;opacity:.35;transition:opacity .15s}
.star:hover,.star.on{opacity:1}

/* ── FORM ── */
.form-card{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:14px;padding:16px;
  margin-top:4px;animation:fadeUp .3s ease;
  max-width:90%;
}
.form-title{
  font-size:.68rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
}
.f-label{
  display:block;font-size:.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);margin-bottom:4px;margin-top:10px;
}
.f-input,.f-select{
  width:100%;background:var(--dark3);
  border:1px solid var(--border);border-radius:9px;
  padding:9px 12px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:.85rem;
  outline:none;transition:border .15s;
}
.f-input:focus,.f-select:focus{border-color:var(--red)}
.f-input::placeholder{color:var(--muted)}
.f-select option{background:var(--dark3)}
.f-submit{
  width:100%;background:var(--red);border:none;
  border-radius:10px;padding:12px;color:#fff;
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.05rem;font-weight:900;letter-spacing:.04em;
  cursor:pointer;margin-top:14px;transition:all .15s;
  box-shadow:0 3px 12px var(--red-glow);
}
.f-submit:hover{background:var(--red-dark);transform:translateY(-1px)}
.f-submit:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* ── INPUT AREA ── */
.input-area{
  background:var(--dark);
  border-top:1px solid var(--border);
  padding:10px 14px;
  flex-shrink:0;
}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{
  flex:1;background:var(--dark2);
  border:1px solid var(--border);border-radius:22px;
  padding:10px 15px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:.85rem;
  outline:none;resize:none;
  max-height:90px;min-height:40px;line-height:1.4;
  transition:border .15s;
}
.input-box:focus{border-color:var(--red)}
.input-box::placeholder{color:var(--muted)}
.send-btn{
  width:40px;height:40px;flex-shrink:0;
  background:var(--red);border:none;border-radius:50%;
  cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:0 3px 10px var(--red-glow);
}
.send-btn:hover{background:var(--red-dark);transform:scale(1.07)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.hint{
  font-size:.62rem;color:var(--muted);
  text-align:center;margin-top:6px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-avatar">🚗</div>
  <div class="header-info">
    <div class="header-name">BARATO<span>CAR</span> Repasses</div>
    <div class="header-status">Online agora · Resposta imediata</div>
  </div>
  <a class="header-catalog" href="https://wa.me/c/553597538122" target="_blank">🛒 Catálogo</a>
</div>

<!-- MESSAGES -->
<div class="messages-wrap" id="msgs"></div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea class="input-box" id="inp" rows="1"
      placeholder="Digite sua mensagem..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="autoH(this)"></textarea>
    <button class="send-btn" id="sbtn" onclick="send()">➤</button>
  </div>
  <div class="hint">Digite ou escolha uma opção acima • (35) 99904-3232</div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const CFG = {
  WA:      '5535999043232',
  CATALOG: 'https://wa.me/c/553597538122',
  SHEETS:  'https://script.google.com/macros/s/AKfycbxYh6fyzTgn_Vu7FVscrcflxcZao6-vIqcTyGYMYWSVP0AUYAYyzLT_bA7ISxaDUmzt/exec',
  GEMINI_KEY: localStorage.getItem('bc_gemini_key') || '',
  GEMINI_MODEL: 'gemini-2.0-flash',
};
function geminiURL(){ return `https://generativelanguage.googleapis.com/v1beta/models/${CFG.GEMINI_MODEL}:generateContent?key=${CFG.GEMINI_KEY}`; }

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const S = {
  stage: 'welcome',   // welcome|flow|chat|converted|human
  flow: null,         // compra|venda|troca|financiar|consultor
  lead: {},
  hist: [],           // histórico Gemini
  busy: false,
  flowStep: 0,
  ratingDone: false,
};

/* ════════════════════════════════════════
   SYSTEM PROMPT
════════════════════════════════════════ */
function sysPrompt() {
  return `Você é Sofia, consultora virtual premium da Baratocar Repasses, especializada em compra, venda, troca e financiamento de veículos em Pouso Alegre, MG.

MISSÃO: Atender cada cliente como um consultor especializado — nunca como um robô. Seja calorosa, objetiva e consultiva. Chame o cliente pelo nome sempre que possível.

DADOS DO CLIENTE:
- Nome: ${S.lead.name||'não informado'}
- Telefone: ${S.lead.phone||'não informado'}
- Interesse: ${S.lead.interest||'não informado'}
- Orçamento: ${S.lead.budget||'não informado'}
- Fluxo: ${S.flow||'não definido'}

ESTOQUE ATUAL:
• Honda Civic EXL 2022/23 — R$95.000 — Automático Flex — 24.000km
• Toyota Corolla XEi 2021/22 — R$128.000 — Automático Flex — 38.000km
• Jeep Compass Limited 2023 — R$172.000 — Automático Flex — 8.000km
• VW T-Cross Highline 2022/23 — R$107.000 — Automático Flex — 19.000km ⭐OFERTA
• Hyundai Creta Platinum 2023 — R$132.000 — Automático Flex — 5.000km
• VW Polo GTS 2023 — R$99.000 — Automático Gasolina — 2.000km ⭐OFERTA
• Renault Duster Iconic 2023 — R$85.000 — CVT Flex — 14.000km
• Fiat Strada Ranch 2022 — R$78.000 — Manual Flex — 31.000km

REGRAS:
1. Respostas curtas e diretas (máx 3 parágrafos)
2. Nunca invente veículos fora da lista acima
3. Adapte recomendações ao perfil e orçamento do cliente
4. Linguagem consultiva: oriente, não apenas venda
5. Se cliente disser "falar com consultor", "humano" ou "ajuda" → responda que vai transferir para o Carlos Cleber imediatamente
6. Quando lead estiver qualificado (nome+telefone+interesse) → sugira WhatsApp com consultor
7. Nunca confirme ser humana se perguntada diretamente — diga que é assistente virtual da Baratocar
8. Use no máximo 2 emojis por mensagem

DIFERENCIAIS DA BARATOCAR:
- Transparência total no processo
- Avaliação justa e rápida
- Financiamento facilitado com múltiplos bancos
- Atendimento personalizado do primeiro contato ao pós-venda
- Pouso Alegre, MG`;
}

/* ════════════════════════════════════════
   RENDER HELPERS
════════════════════════════════════════ */
const wrap = () => document.getElementById('msgs');
const now  = () => new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

function scroll() { setTimeout(()=>{ const w=wrap(); w.scrollTop=w.scrollHeight; },60); }

function addMsg(role, html, isHTML=false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = role==='bot' ? '🚗' : (S.lead.name?.[0]?.toUpperCase()||'👤');
  div.innerHTML = `
    <div class="msg-av">${av}</div>
    <div>
      <div class="bubble">${isHTML ? html : esc(html).replace(/\n/g,'<br>')}</div>
      <div class="msg-meta">${now()}</div>
    </div>`;
  wrap().appendChild(div);
  if(role!=='bot'||!isHTML) S.hist.push({role:role==='bot'?'model':'user', parts:[{text: stripHTML(html)}]});
  scroll();
}

function addRaw(el) { wrap().appendChild(el); scroll(); }

function addQR(opts, onSelect) {
  removeQR();
  const div = document.createElement('div');
  div.className='qr-wrap'; div.id='qr';
  div.innerHTML = opts.map(o=>`<div class="qr" data-v="${o.v||o}">${o.l||o}</div>`).join('');
  div.querySelectorAll('.qr').forEach(q => q.onclick=()=>{
    removeQR();
    const val = q.dataset.v;
    addMsg('user', q.textContent);
    onSelect(val, q.textContent);
  });
  wrap().appendChild(div);
  scroll();
}

function removeQR() { document.getElementById('qr')?.remove(); }

function showTyping() {
  hideTyping();
  const div=document.createElement('div');
  div.className='typing';div.id='typ';
  div.innerHTML=`<div class="msg-av">🚗</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  wrap().appendChild(div);scroll();
}
function hideTyping(){ document.getElementById('typ')?.remove(); }

function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function stripHTML(h){ return h.replace(/<[^>]*>/g,''); }

/* ════════════════════════════════════════
   LEAD SCORE
════════════════════════════════════════ */
function calcScore(){
  let s=0;
  if(S.lead.name) s+=20;
  if(S.lead.phone) s+=25;
  if(S.lead.interest) s+=15;
  const b=S.lead.budget||'';
  if(b.includes('180')||b.includes('acima')) s+=40;
  else if(b.includes('120')) s+=32;
  else if(b.includes('80')) s+=24;
  else if(b.includes('50')) s+=14;
  else if(b) s+=8;
  if(S.flow==='compra'||S.flow==='financiar') s+=10;
  return Math.min(s,100);
}
function scorePill(sc){
  if(sc>=75) return `<span class="score-pill s-hot">🔥 Lead Quente · ${sc}pts</span>`;
  if(sc>=45) return `<span class="score-pill s-warm">🌡️ Lead Morno · ${sc}pts</span>`;
  return `<span class="score-pill s-cold">❄️ Lead Frio · ${sc}pts</span>`;
}

/* ════════════════════════════════════════
   SAVE TO SHEETS
════════════════════════════════════════ */
async function saveSheets(){
  const sc=calcScore();
  const payload={
    id:Date.now(), name:S.lead.name, phone:S.lead.phone,
    email:'', origin:`Atendimento Virtual · ${S.flow||'direto'}`,
    interest:S.lead.interest, budget:S.lead.budget,
    deadline:S.lead.deadline||'N/I',
    consultor:'Carlos Cleber',
    notes:`Sofia · Fluxo: ${S.flow} · Steps: ${S.flowStep}`,
    score:sc, temp:sc>=75?'hot':sc>=45?'warm':'cold',
    stage:'Novo Lead'
  };
  try {
    await fetch(CFG.SHEETS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  } catch(e){}
  return sc;
}

/* ════════════════════════════════════════
   CTA WHATSAPP
════════════════════════════════════════ */
function addWACTA(){
  if(S.stage==='converted') return;
  S.stage='converted';
  const msg=encodeURIComponent(
    `Olá! Sou ${S.lead.name||'um cliente'} e fui atendido(a) pela Sofia (assistente da Baratocar).\n\n`+
    `🎯 Interesse: ${S.lead.interest||'a combinar'}\n`+
    `💰 Orçamento: ${S.lead.budget||'a combinar'}\n`+
    `📋 Fluxo: ${S.flow||'geral'}\n\n`+
    `Gostaria de continuar com um consultor! 🚗`
  );

  const sc=calcScore();
  const el=document.createElement('div');
  el.style.cssText='margin-left:38px;display:flex;flex-direction:column;gap:0';
  el.innerHTML=`
    ${scorePill(sc)}
    <a class="wa-cta" href="https://wa.me/${CFG.WA}?text=${msg}" target="_blank">
      <div class="wa-icon">💬</div>
      <div><div class="wa-label">Falar com Consultor Agora</div><div class="wa-sub">(35) 99904-3232 · Resposta imediata</div></div>
    </a>
    <a class="cat-cta" href="${CFG.CATALOG}" target="_blank">
      <div style="font-size:1.4rem">🛒</div>
      <div><div class="c-label">Ver Catálogo Completo</div><div class="c-sub">Todos os veículos com fotos e preços</div></div>
    </a>`;
  addRaw(el);
  saveSheets();
}

/* ════════════════════════════════════════
   TRANSFERÊNCIA PARA CONSULTOR
════════════════════════════════════════ */
function addTransfer(motivo){
  S.stage='human';
  const msg=encodeURIComponent(
    `Olá, Carlos! Preciso de atendimento humano.\n`+
    `Nome: ${S.lead.name||'não informado'}\n`+
    `Motivo: ${motivo||'solicitação do cliente'}`
  );
  const el=document.createElement('div');
  el.style.cssText='margin-left:38px';
  el.innerHTML=`
    <div class="transfer-card">
      <div class="t-title">🤝 Transferindo para Consultor</div>
      <div class="t-sub">Carlos Cleber entrará em contato imediatamente</div>
      <a class="transfer-btn" href="https://wa.me/${CFG.WA}?text=${msg}" target="_blank">
        💬 Falar com Carlos Agora
      </a>
    </div>`;
  addRaw(el);
  saveSheets();
}

function addRating(){

  const el=document.createElement('div');

function rate(n){
  document.querySelectorAll('.star').forEach((s,i)=>{
    s.classList.toggle('on', i<n);
    s.onclick=null;
  });
  const msgs = ['','Obrigado pelo feedback. Vamos melhorar! 🙏','Agradecemos sua avaliação! 😊','Ótimo! Fico feliz em ter ajudado! 😊','Que ótimo! Sua satisfação é nossa prioridade! ⭐','Excelente! Fico muito feliz com sua avaliação! 🎉 Obrigado pela confiança na Baratocar!'];
  setTimeout(()=>addMsg('bot', msgs[n]||'Obrigado!'), 400);
}

/* ════════════════════════════════════════
   GEMINI API
════════════════════════════════════════ */
async function askGemini(userText){
  showTyping();
  try {
    const hist=[...S.hist];
    if(hist.length===0||hist[hist.length-1].role!=='user'){
      hist.push({role:'user',parts:[{text:userText}]});
    }
    CFG.GEMINI_KEY = localStorage.getItem('bc_gemini_key')||'';
    const res=await fetch(geminiURL(),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:sysPrompt()}]},
        contents:hist,
        generationConfig:{maxOutputTokens:350,temperature:0.8,topP:0.9}
      })
    });
    const d=await res.json();
    hideTyping();
    const reply=d?.candidates?.[0]?.content?.parts?.[0]?.text||'Desculpe, tive um problema. Pode repetir?';
    addMsg('bot',reply);

    // Detecta palavras-chave para transferência
    const lower=userText.toLowerCase();
    const transfer=['falar com consultor','atendimento humano','preciso de ajuda','quero falar com alguém','humano','carlos'];
    if(transfer.some(t=>lower.includes(t))){
      setTimeout(()=>addTransfer(userText),600);
      return;
    }

    // Mostra CTA se qualificado
    const readyForCTA = S.lead.name && S.lead.phone && S.lead.interest && S.stage!=='converted';
    const aiSuggestsWA = reply.toLowerCase().includes('whatsapp')||reply.toLowerCase().includes('consultor')||S.hist.length>=8;
    if((readyForCTA&&aiSuggestsWA)||S.hist.length>=10){
      setTimeout(addWACTA,700);
    }
  } catch(err){
    hideTyping();
    addMsg('bot','Estou com dificuldade técnica no momento. Mas posso te conectar direto com nosso consultor!');
    setTimeout(addWACTA,600);
  }
}

function getSteps(){
  if(S.flow==='compra') return COMPRA_STEPS;
  if(S.flow==='venda') return VENDA_STEPS;
  if(S.flow==='troca') return TROCA_STEPS;
  if(S.flow==='financiar') return FINANCIAR_STEPS;
  return [];
}

async function runStep(answer){
  const steps=getSteps();
  const step=steps[S.flowStep];
  if(step&&answer!==undefined){
    S.lead[step.field]=answer;
  }
  S.flowStep++;

  if(S.flowStep>=steps.length){
    // Fluxo concluído
    await finishFlow();
    return;
  }

  const next=steps[S.flowStep];
  showTyping();
  await delay(700);
  hideTyping();
  addMsg('bot', next.ask);

  if(next.qr){
    addQR(next.qr, (val)=>{
      runStep(val);
    });
  }
}

async function finishFlow(){
  showTyping();
  await delay(1000);
  hideTyping();

  let msg='';
  if(S.flow==='compra'||S.flow==='financiar'){
    msg=`Perfeito${S.lead.name?', '+S.lead.name:''}! 🎯\n\nCom base no seu perfil, nossa equipe fará uma busca personalizada e apresentará as melhores oportunidades disponíveis para você.\n\nPara finalizar, preciso de seus dados de contato:`;

    msg=`Excelente${S.lead.name?', '+S.lead.name:''}! 📋\n\nRecebemos as informações do seu veículo. Nossa equipe iniciará a análise para apresentar a melhor proposta de comercialização.\n\nPara receber a avaliação, confirme seus dados:`;

  }
  addMsg('bot', msg);
  setTimeout(addCaptureForm, 500);
}

async function submitCapture(){
  const name=document.getElementById('fn')?.value.trim();
  const phone=document.getElementById('fp')?.value.trim();
  if(!name||!phone){
    if(!name) document.getElementById('fn').style.borderColor='var(--red)';
    if(!phone) document.getElementById('fp').style.borderColor='var(--red)';
    return;
  }
  S.lead.name=name; S.lead.phone=phone;
  document.getElementById('cap-form').innerHTML='<div style="color:#4CAF50;font-weight:700;padding:8px 0">✅ Dados confirmados!</div>';

  addMsg('user',`${name} · ${phone}`);

  showTyping();
  await delay(1000);
  hideTyping();

  const sc=await saveSheets();
  const pill=scorePill(sc);

  const el=document.createElement('div');
  el.style.cssText='margin-left:38px';
  el.innerHTML=`${pill}`;
  addRaw(el);

  addMsg('bot',`Perfeito, ${name}! ✅ Seus dados foram registrados com sucesso.\n\nUm consultor especializado vai entrar em contato com você pelo WhatsApp informado para apresentar as melhores opções.\n\nEnquanto isso, você pode:\n👇 Acessar o catálogo completo ou falar diretamente com nosso consultor:`);

    addMsg('bot','Como foi sua experiência no atendimento até agora?');

}

/* ════════════════════════════════════════
   ENVIO LIVRE (CHAT ABERTO)
════════════════════════════════════════ */
async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text||S.busy) return;
  removeQR();
  inp.value='';
  inp.style.height='';

  // Detecta transferência por palavras-chave
  const lower=text.toLowerCase();
  const transferKeys=['falar com consultor','atendimento humano','preciso de ajuda','quero humano','carlos','falar com pessoa'];
  if(transferKeys.some(k=>lower.includes(k))){
    addMsg('user',text);
    addMsg('bot','Entendido! Vou te transferir agora para o Carlos Cleber. 🤝');
    setTimeout(()=>addTransfer(text),500);
    return;
  }

  addMsg('user',text);

  // Se ainda está no welcome, inicia captura rápida
  if(S.stage==='welcome'){
    S.stage='chat';
    showTyping();
    await delay(800);
    hideTyping();
    addMsg('bot','Olá! Para te atender melhor, me conta: o que você está procurando? Compra, venda, troca ou financiamento de veículo?');
    addQR([
      {l:'🚗 Comprar',v:'compra'},{l:'💰 Vender',v:'venda'},
      {l:'🔄 Trocar',v:'troca'},{l:'💳 Financiar',v:'financiar'},
    ],(val)=>{
      S.flow=val; S.stage='flow'; S.flowStep=0;
      const steps=getSteps();
      addMsg('bot',steps[0].ask);
      if(steps[0].qr) addQR(steps[0].qr,(v)=>runStep(v));
    });
    return;
  }

  S.busy=true;
  document.getElementById('sbtn').disabled=true;
  await askGemini(text);
  S.busy=false;
  document.getElementById('sbtn').disabled=false;
}

function checkKey(){
  const k = localStorage.getItem('bc_gemini_key');
  if(!k){
    // Mostra input para configurar chave na primeira vez
    const div = document.createElement('div');
    div.id = 'key-setup';
    div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    div.innerHTML = `
      <div style="background:#181818;border:1px solid #333;border-radius:16px;padding:24px;max-width:380px;width:100%">
        <div style="font-family:Barlow Condensed,sans-serif;font-size:1.3rem;font-weight:900;margin-bottom:6px">🔑 Configurar IA</div>
        <div style="font-size:.78rem;color:#666;margin-bottom:16px;line-height:1.5">Cole sua chave do Google Gemini para ativar o atendimento automático com inteligência artificial.</div>
        <input id="key-inp" placeholder="AQ.Ab8RN..." style="width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:10px 12px;color:#fff;font-size:.82rem;outline:none;font-family:Inter,sans-serif;margin-bottom:10px">
        <button onclick="saveKey()" style="width:100%;background:#D72B2B;border:none;border-radius:8px;padding:12px;color:#fff;font-family:Barlow Condensed,sans-serif;font-size:1rem;font-weight:900;cursor:pointer">Ativar Atendimento IA →</button>
        <div style="text-align:center;margin-top:10px">
          <span onclick="skipKey()" style="font-size:.72rem;color:#555;cursor:pointer;text-decoration:underline">Continuar sem IA (modo básico)</span>
        </div>
      </div>`;
    document.body.appendChild(div);
    setTimeout(()=>document.getElementById('key-inp')?.focus(),300);
  }
}
function saveKey(){
  const k = document.getElementById('key-inp')?.value.trim();
  if(!k){ alert('Cole a chave antes de continuar.'); return; }
  localStorage.setItem('bc_gemini_key', k);
  CFG.GEMINI_KEY = k;
  document.getElementById('key-setup')?.remove();
  welcome();
}
function skipKey(){
  document.getElementById('key-setup')?.remove();
  welcome();
}

checkKey();
if(localStorage.getItem('bc_gemini_key')) welcome();
